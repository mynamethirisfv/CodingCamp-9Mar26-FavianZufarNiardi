<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productivity Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <!-- Global Storage Notification -->
    <div class="storage-notification" id="storage-notification" style="display: none;"></div>
    
    <!-- Greeting Display -->
    <header id="greeting-display" class="greeting-section">
      <div class="time-display"></div>
      <div class="date-display"></div>
      <div class="greeting-message"></div>
    </header>

    <!-- Focus Timer -->
    <section id="focus-timer" class="timer-section">
      <h2>Focus Timer</h2>
      <div class="timer-display">25:00</div>
      <div class="timer-controls">
        <button data-action="start">Start</button>
        <button data-action="stop">Stop</button>
        <button data-action="reset">Reset</button>
      </div>
      <div class="timer-notification" style="display: none;"></div>
    </section>

    <!-- Task List -->
    <section id="task-manager" class="task-section">
      <h2>Tasks</h2>
      <div class="task-input-group">
        <input type="text" id="task-input" placeholder="Add a new task...">
        <button data-action="add-task">Add</button>
      </div>
      <div class="error-message" id="task-error" style="display: none;"></div>
      <ul class="task-list"></ul>
    </section>

    <!-- Quick Links -->
    <section id="link-manager" class="links-section">
      <h2>Quick Links</h2>
      <div class="link-input-group">
        <input type="url" id="link-url" placeholder="URL">
        <input type="text" id="link-name" placeholder="Display Name">
        <button data-action="add-link">Add</button>
      </div>
      <div class="error-message" id="link-error" style="display: none;"></div>
      <ul class="link-list"></ul>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
